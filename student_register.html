<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration | Environmental Education System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,700;1,400&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Source Sans 3', sans-serif;
            min-height: 100vh;
            background: #f0f4f0;
            display: flex;
            flex-direction: column;
        }

        /* ── NAVBAR ── */
        .navbar {
            background: #2d6a2d;
            padding: 14px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar-brand {
            color: white;
            font-weight: 600;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .navbar-brand span { color: white; font-size: 18px; font-weight: 600; }
        .btn-back {
            color: white;
            border: 2px solid rgba(255,255,255,0.6);
            padding: 7px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }
        .btn-back:hover { background: white; color: #2d6a2d; border-color: white; }

        /* ── MAIN LAYOUT ── */
        .register-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #e8f5e8 0%, #f0f4f0 50%, #e0ede0 100%);
        }

        .register-wrapper::before {
            content: '';
            position: fixed;
            top: -80px; right: -80px;
            width: 300px; height: 300px;
            border-radius: 50%;
            background: rgba(45,106,45,0.06);
            pointer-events: none;
        }
        .register-wrapper::after {
            content: '';
            position: fixed;
            bottom: -60px; left: -60px;
            width: 240px; height: 240px;
            border-radius: 50%;
            background: rgba(45,106,45,0.06);
            pointer-events: none;
        }

        /* ── CARD ── */
        .register-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(45,106,45,0.12), 0 2px 8px rgba(0,0,0,0.06);
            width: 100%;
            max-width: 550px;
            overflow: hidden;
            animation: slideUp 0.4s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Card header */
        .card-header-custom {
            background: #2d6a2d;
            padding: 28px 36px 24px;
            text-align: center;
        }
        .card-header-custom h2 {
            font-family: 'Merriweather', serif;
            color: white;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .card-header-custom p {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
        }

        /* Card body */
        .card-body-custom { padding: 32px 36px 36px; }

        /* ── STEP LABEL ── */
        .step-label {
            font-size: 13px;
            font-weight: 600;
            color: #2d6a2d;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 20px;
        }

        /* ── FORM FIELDS ── */
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #2a4a2a;
            margin-bottom: 7px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 11px 16px;
            border: 1.5px solid #d0dcd0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Source Sans 3', sans-serif;
            color: #1a2a1a;
            background: #fafcfa;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #2d6a2d;
            box-shadow: 0 0 0 3px rgba(45,106,45,0.12);
            background: white;
        }
        .form-group input::placeholder { color: #aab8aa; }

        /* Two-column layout */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .form-row .form-group { margin-bottom: 0; }

        /* ── BUTTONS ── */
        .btn-container {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .btn-register {
            flex: 1;
            background: #2d6a2d;
            color: white;
            border: none;
            padding: 13px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Source Sans 3', sans-serif;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-register:hover {
            background: #1e4e1e;
            transform: translateY(-1px);
        }
        .btn-register:active { transform: translateY(0); }

        .btn-cancel {
            flex: 1;
            background: #f0f0f0;
            color: #2d6a2d;
            border: 1.5px solid #d0dcd0;
            padding: 13px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Source Sans 3', sans-serif;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-cancel:hover {
            background: #e8f5e8;
            border-color: #2d6a2d;
        }

        .btn-arrow {
            width: 18px; height: 18px;
            transition: transform 0.2s;
        }
        .btn-register:hover .btn-arrow { transform: translateX(3px); }

        /* ── DIVIDER ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e8e0;
        }
        .divider span { font-size: 12px; color: #aab8aa; white-space: nowrap; }

        /* ── LOGIN LINK ── */
        .login-link {
            text-align: center;
            font-size: 13px;
            color: #666;
        }
        .login-link a {
            color: #2d6a2d;
            text-decoration: none;
            font-weight: 600;
        }
        .login-link a:hover { text-decoration: underline; }

        /* ── FOOTER ── */
        footer {
            background: #f0f0ec;
            padding: 18px 40px;
            text-align: center;
            border-top: 1px solid #ddd;
        }
        footer p {
            font-size: 13px;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        footer p::before, footer p::after {
            content: '';
            width: 60px;
            height: 1px;
            background: #ccc;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            .card-body-custom { padding: 24px 20px 28px; }
            .card-header-custom { padding: 22px 20px 18px; }
            .form-row {
                grid-template-columns: 1fr;
            }
            .navbar { padding: 12px 20px; }
            .navbar-brand span { font-size: 13px; }
            .btn-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<!-- ── NAVBAR ── -->
<nav class="navbar">
    <a href="index.html" class="navbar-brand">
        <svg width="36" height="36" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="18" fill="#1a4f1a" stroke="white" stroke-width="1.5"/>
            <ellipse cx="20" cy="20" rx="8" ry="18" fill="none" stroke="white" stroke-width="1" opacity="0.6"/>
            <line x1="2" y1="20" x2="38" y2="20" stroke="white" stroke-width="1" opacity="0.6"/>
            <line x1="5" y1="12" x2="35" y2="12" stroke="white" stroke-width="1" opacity="0.4"/>
            <line x1="5" y1="28" x2="35" y2="28" stroke="white" stroke-width="1" opacity="0.4"/>
        </svg>
        <span>Environmental Education System</span>
    </a>
    <a href="index.html" class="btn-back">&#8592; Back to Home</a>
</nav>

<!-- ── REGISTER WRAPPER ── -->
<div class="register-wrapper">
    <div class="register-card">

        <!-- Card Header -->
        <div class="card-header-custom">
            <h2>Create Student Account</h2>
            <p>Join our environmental learning community</p>
        </div>

        <!-- Card Body -->
        <div class="card-body-custom">

            <p class="step-label">Student Registration Form</p>

            <form id="student-register-form" onsubmit="handleRegister(event)">

                <!-- Full Name -->
                <div class="form-group">
                    <label for="full-name">Full Name *</label>
                    <input type="text" id="full-name" name="full_name" placeholder="e.g. राज कुमार" required autocomplete="name">
                </div>

                <!-- Email & Student ID Row -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="student-email">Email Address *</label>
                        <input type="email" id="student-email" name="email" placeholder="your@email.com" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="student-id">Student ID *</label>
                        <input type="text" id="student-id" name="student_id" placeholder="STU2024001" required autocomplete="off">
                    </div>
                </div>

                <!-- Date of Birth & Gender Row -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="dob">Date of Birth *</label>
                        <input type="date" id="dob" name="dob" required>
                    </div>
                    <div class="form-group">
                        <label for="gender">Gender *</label>
                        <select id="gender" name="gender" required>
                            <option value="">Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>

                <!-- School & Class Row -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="school">School/College Name *</label>
                        <input type="text" id="school" name="school" placeholder="e.g. St. Xavier's School" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="class">Class/Grade *</label>
                        <input type="text" id="class" name="class" placeholder="e.g. 10-A" required autocomplete="off">
                    </div>
                </div>

                <!-- Contact Number -->
                <div class="form-group">
                    <label for="phone">Contact Number *</label>
                    <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210" required autocomplete="tel">
                </div>

                <!-- Password & Confirm Password Row -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="password">Password *</label>
                        <input type="password" id="password" name="password" placeholder="Min 8 characters" required autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">Confirm Password *</label>
                        <input type="password" id="confirm-password" name="confirm_password" placeholder="Confirm password" required autocomplete="new-password">
                    </div>
                </div>

                <!-- Terms & Conditions -->
                <div class="form-group" style="margin-bottom: 20px;">
                    <input type="checkbox" id="terms" name="terms" required style="width: auto; margin-right: 8px;">
                    <label for="terms" style="display: inline; margin-bottom: 0;">I agree to the Terms & Conditions</label>
                </div>

                <!-- Error Message Display -->
                <div id="error-msg" style="display:none;"></div>

                <!-- Buttons -->
                <div class="btn-container">
                    <button type="submit" class="btn-register">
                        Register
                        <svg class="btn-arrow" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                    <a href="index.html" class="btn-cancel">Cancel</a>
                </div>

            </form>

            <div class="divider"><span>Already have an account?</span></div>

            <p class="login-link">
                Go to <a href="login.html">Login Page</a>
            </p>

        </div><!-- end card-body -->
    </div><!-- end register-card -->
</div><!-- end register-wrapper -->

<!-- ── FOOTER ── -->
<footer>
    <p>© 2026 Environmental Education Project</p>
</footer>

<script>
    function showError(message) {
        const errorDiv = document.getElementById('error-msg');
        errorDiv.textContent = message;
        errorDiv.style.cssText = 'background:#fff0f0;border-left:4px solid #a32d2d;color:#a32d2d;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:block;';
    }

    function clearError() {
        const errorDiv = document.getElementById('error-msg');
        errorDiv.style.display = 'none';
    }

    function handleRegister(event) {
        event.preventDefault();
        clearError();

        const form = event.target;
        const btn = form.querySelector('.btn-register');
        const formData = new FormData(form);

        // Client-side validation
        const password = formData.get('password');
        const confirmPassword = formData.get('confirm_password');

        if (password !== confirmPassword) {
            showError('❌ Passwords do not match!');
            return;
        }

        if (password.length < 8) {
            showError('❌ Password must be at least 8 characters long!');
            return;
        }

        // Show loading state
        btn.innerHTML = 'Registering... <span style="opacity:0.7">please wait</span>';
        btn.disabled = true;

        // Send data to backend
        fetch('/register/student', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(Object.fromEntries(formData))
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                btn.innerHTML = '✓ Account Created! Redirecting...';
                setTimeout(() => {
                    window.location.href = data.redirect || 'login.html';
                }, 1500);
            } else {
                showError('❌ ' + (data.message || 'Registration failed. Try again.'));
                btn.innerHTML = 'Register <svg class="btn-arrow" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
                btn.disabled = false;
            }
        })
        .catch(error => {
            showError('❌ Server error. Please try again later.');
            btn.innerHTML = 'Register <svg class="btn-arrow" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
            btn.disabled = false;
        });
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
